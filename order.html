<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Замовлення - Галицький Дзвінкач</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<style>
.slider {
  position: relative;
  overflow: hidden;
  border-radius: .5rem;
}
.slider img {
  width: 100%;
  height: 350px;
  object-fit: cover;
}
.controls {
  position: absolute;
  top: 50%;
  width: 100%;
  display: flex;
  justify-content: space-between;
}
.controls button {
  background: rgba(0,0,0,.5);
  color: #fff;
  border: none;
  padding: .5rem 1rem;
}
</style>
</head>

<body>

<header>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">Галицький Дзвінкач</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link disabled">093-123-45-67</a></li>
        <li class="nav-item"><a class="nav-link" href="assortment.html">Асортимент</a></li>
        <li class="nav-item"><a class="nav-link" href="types.html">Типи цегли</a></li>
        <li class="nav-item"><a class="nav-link" href="musieum.html">Інтернет-музей</a></li>
      </ul>
    </div>

  </div>
</nav>
</header>

<div id="orderApp" class="container my-4">

<h1 class="mb-4">🛒 Замовлення</h1>

<div v-if="product" class="row">

  <div class="col-md-6">
    <div class="slider">
      <img :src="currentImageSrc" v-if="currentImageSrc">

      <div class="controls" v-if="product.images && product.images.length">
        <button @click="prevImage">‹</button>
        <button @click="nextImage">›</button>
      </div>
    </div>
  </div>

  <div class="col-md-6">
    <h3>{{ product.name }}</h3>
    <p>{{ product.type }} · {{ product.color }}</p>
    <p class="fs-4 fw-bold">{{ product.price }} ₴</p>

    <div v-if="product.availability === 'in'">
      <a :href="product.olxLink" target="_blank" class="btn btn-success">
        Купити на OLX
      </a>
    </div>

    <div v-else>
      <p>Під замовлення</p>
      <a :href="'tel:' + phone" class="btn btn-primary">{{ phone }}</a>
    </div>

    <a href="assortment.html" class="btn btn-secondary mt-3">← Назад</a>
  </div>

</div>

<div v-else>
  <p>Товар не знайдено 😢</p>
</div>

</div>

<script>
const { createApp } = Vue;

createApp({
data() {
  return {
    phone: "+38 (099) 123-45-67",
    products: [],
    product: null,
    index: 0
  };
},

mounted() {
  fetch('./products.json')
    .then(r => r.json())
    .then(data => {
      this.products = data;

      const id = Number(new URLSearchParams(location.search).get('id'));
      this.product = this.products.find(p => p.id === id);
    });
},

computed: {
  currentImageSrc() {
    if (!this.product || !this.product.images) return "";
    return "img/" + this.product.images[this.index];
  }
},

methods: {
  nextImage() {
    if (!this.product?.images) return;
    this.index = (this.index + 1) % this.product.images.length;
  },

  prevImage() {
    if (!this.product?.images) return;
    this.index = (this.index - 1 + this.product.images.length) % this.product.images.length;
  }
}

}).mount('#orderApp');
</script>

</body>
</html>
