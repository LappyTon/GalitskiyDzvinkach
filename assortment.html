<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Галицький Двінкач — Асортимент</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

<style>
.card { box-shadow: 0 4px 8px rgba(0,0,0,.1); transition:.2s; }
.card:hover { transform: translateY(-5px); }
.card-img-top { height:200px; object-fit:cover; }
.sidebar { background:#f8f9fa; padding:1rem; border-radius:.5rem; }
</style>
</head>
<body>

<div id="app">


<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Галицький Двінкач</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link disabled" href="#" style="color: #ffffff;">093-123-45-67</a></li>
                    <li class="nav-item"><a class="nav-link disabled" href="#" style="color: #888888;">|</a></li>
                    <li class="nav-item"><a class="nav-link" href="assortment.html" style="color: #ffffff;">Асортимент</a></li>
                    <li class="nav-item"><a class="nav-link" href="types.html">Типи цегли</a></li>
                    <li class="nav-item"><a class="nav-link" href="musieum.html">Інтернет-музей</a></li>
                    <!-- <li class="nav-item"><a class="nav-link" href="contacts.html">Контакти</a></li> -->
                </ul>
            </div>
        </div>
    </nav>
</header>
<main class="container my-4">
<h1 class="mb-4">🛍️ Асортимент</h1>

<div class="row">

<!-- SIDEBAR -->
<div class="col-lg-3">
<div class="sidebar">

<!-- SORT -->
<label class="fw-bold">Сортування</label>
<select v-model="filters.sort" class="form-select form-select-sm mb-2">
  <option value="">Без сортування</option>
  <option value="price-asc">Дешеві → Дорогі</option>
  <option value="price-desc">Дорогі → Дешеві</option>
</select>

<!-- AVAILABILITY -->
<label class="fw-bold">Наявність</label>
<select v-model="filters.availability" class="form-select form-select-sm mb-2">
  <option value="">Всі</option>
  <option value="in">В наявності</option>
  <option value="order">Під замовлення</option>
</select>

<hr>

<!-- TYPE -->
<label class="fw-bold">Тип</label>
<div v-for="t in uniqueTypes" :key="t" class="form-check">
  <input class="form-check-input" type="checkbox" :value="t" v-model="filters.types">
  <label class="form-check-label">{{ t }}</label>
</div>

<hr>

<!-- COLOR -->
<label class="fw-bold">Колір</label>
<div v-for="c in uniqueColors" :key="c" class="form-check">
  <input class="form-check-input" type="radio" :value="c" v-model="filters.color">
  <label class="form-check-label">{{ c }}</label>
</div>

<hr>

<!-- STAMP -->
<label class="fw-bold">Штамп</label>
<select v-model="filters.stamp" class="form-select form-select-sm mb-2">
  <option value="">Всі</option>
  <option v-for="s in uniqueStamps" :key="s" :value="s">{{ s }}</option>
</select>

<hr>

<!-- LEDGES -->
<label class="fw-bold">Відлив</label>
<div class="form-check">
  <input class="form-check-input" type="radio" value="" v-model="filters.ledges">
  <label class="form-check-label">Всі</label>
</div>
<div class="form-check">
  <input class="form-check-input" type="radio" value="with" v-model="filters.ledges">
  <label class="form-check-label">З відливом</label>
</div>
<div class="form-check">
  <input class="form-check-input" type="radio" value="without" v-model="filters.ledges">
  <label class="form-check-label">Без відливу</label>
</div>

<button class="btn btn-sm btn-outline-secondary mt-3" @click="resetFilters">
  Скинути фільтри
</button>

</div>
</div>

<!-- PRODUCTS -->
<div class="col-lg-9">
<div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-3">

<div class="col" v-for="p in filteredProducts" :key="p.id">
  <div class="card h-100">
    <img :src="p.img" class="card-img-top">
    <div class="card-body">
      <h5>{{ p.name }}</h5>
      <p class="small text-muted">
        {{ p.type }} · {{ p.color }}
        <span v-if="p.stamp && p.stamp!=='none'"><br>Штамп: {{ p.stamp }}</span>
        <span v-if="p.ledges === 'with'"><br>З відливом</span>
      </p>
      <p class="fs-5 fw-bold">{{ p.price }} ₴</p>

      <a :href="'order.html?id=' + p.id"
         class="btn btn-sm"
         :class="p.availability==='in' ? 'btn-primary' : 'btn-secondary'">
        {{ p.availability==='in' ? 'Переглянути' : 'Замовити' }}
      </a>
    </div>
  </div>
</div>

<div v-if="filteredProducts.length===0" class="col">
  <p>Нічого не знайдено 😢</p>
</div>

</div>
</div>

</div>
</main>

</div>

<script>
const { createApp } = Vue;

createApp({
data(){
  return {
    products: [],
    filters:{
      sort:"",
      availability:"",
      types:[],
      color:"",
      stamp:"",
      ledges:""
    }
  }
},
mounted(){
  fetch('products.json')
    .then(r=>r.json())
    .then(d=>{
      this.products = d.map(p=>({
        ...p,
        price: Number(p.price)
      }));
    });
},
computed:{
  uniqueTypes(){
    return [...new Set(this.products.map(p=>p.type))];
  },
  uniqueColors(){
    return [...new Set(this.products.map(p=>p.color))];
  },
  uniqueStamps(){
    return [...new Set(this.products.map(p=>p.stamp).filter(s=>s!=="none"))];
  },
  filteredProducts(){
    let r = [...this.products];

    if(this.filters.types.length)
      r = r.filter(p=>this.filters.types.includes(p.type));

    if(this.filters.color)
      r = r.filter(p=>p.color === this.filters.color);

    if(this.filters.stamp)
      r = r.filter(p=>p.stamp === this.filters.stamp);

    if(this.filters.ledges)
      r = r.filter(p=>p.ledges === this.filters.ledges);

    if(this.filters.availability)
      r = r.filter(p=>p.availability === this.filters.availability);

    // сортування за ціною
    if(this.filters.sort === "price-asc")
      r.sort((a,b)=>a.price - b.price);

    if(this.filters.sort === "price-desc")
      r.sort((a,b)=>b.price - a.price);

    // товари, яких нема в наявності, в кінець
    r.sort((a,b)=>{
      if(a.availability === 'in' && b.availability !== 'in') return -1;
      if(a.availability !== 'in' && b.availability === 'in') return 1;
      return 0;
    });

    return r;
  }
},
methods:{
  resetFilters(){
    this.filters = {
      sort:"",
      availability:"",
      types:[],
      color:"",
      stamp:"",
      ledges:""
    }
  }
}
}).mount('#app');
</script>

</body>
</html>
